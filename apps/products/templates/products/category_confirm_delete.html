<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Удаление категории</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light p-4">
    <div class="container bg-white p-4 rounded shadow-sm" style="max-width: 500px;">
        <h1 class="h4 text-danger mb-3">Вы уверены, что хотите удалить категорию "{{ object.name }}"?</h1>
        <p class="text-muted">Это действие нельзя будет отменить.</p>
        
        <form method="post">
            {% csrf_token %}
            <div class="d-flex justify-content-between mt-4">
                <a href="{% url 'products:category_list' %}" class="btn btn-outline-secondary">Отмена</a>
                <button type="submit" class="btn btn-danger">Да, удалить</button>
            </div>
        </form>
    </div>
</body>
</html>
