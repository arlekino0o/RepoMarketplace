<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тестовый платежный шлюз - Маркетплейс</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .bank-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            max-width: 450px;
            width: 100%;
            text-align: center;
        }
        h2 { margin-top: 0; color: #111827; font-size: 20px; }
        .order-details {
            background-color: #f9fafb;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: left;
            font-size: 14px;
        }
        .price { font-size: 24px; font-weight: 800; color: #2563eb; text-align: center; margin: 10px 0; }
        .btn-group { display: flex; gap: 15px; justify-content: center; margin-top: 25px; }
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            flex: 1;
            transition: opacity 0.15s;
        }
        .btn:hover { opacity: 0.9; }
        .btn-success { background-color: #10b981; color: white; }
        .btn-fail { background-color: #ef4444; color: white; }
    </style>
</head>
<body>

    <div class="bank-container">
        <h2>Имитация банковского шлюза</h2>
        <p style="color: #6b7280; font-size: 14px;">Тестовая среда маркетплейса</p>

        <div class="order-details">
            <div><strong>Заказ:</strong> №{{ order.id }}</div>
            <div class="price">{{ order.get_total_price }} руб.</div>
            <div style="font-size: 11px; color: #9ca3af; word-break: break-all; margin-top: 5px;">
                <strong>ID транзакции:</strong> {{ payment_id }}
            </div>
        </div>

        <form method="post" action="{% url 'orders:payment' %}">
            {% csrf_token %}
            <input type="hidden" name="order_id" value="{{ order.id }}">

            <div class="btn-group">
                <button type="submit" name="action" value="success" class="btn btn-success">
                    Успешная оплата
                </button>
                <button type="submit" name="action" value="failed" class="btn btn-fail">
                    Отклонить платеж
                </button>
            </div>
        </form>
    </div>

</body>
</html>
