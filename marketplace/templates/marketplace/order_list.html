{% extends "base.html" %}

{% block title %}My orders{% endblock %}

{% block content %}
    <h1>Мои заказы</h1>
    <section class="orders-list">
    {% for order in orders %}
        <article class="order-card">
            <div class="order-header">
                <h3><a href="{% url 'marketplace:order_detail' order.pk %}">Заказ #{{ order.pk }}</a></h3>
                <span>{{ order.get_status_display }}</span>
            </div>
            <div class="order-body">
                <p>{{ order.repository.title }} — {{ order.price }}</p>
            </div>
        </article>
    {% empty %}
        <p>У вас пока нет заказов.</p>
    {% endfor %}
    </section>
{% endblock %}
