{% extends "base.html" %}

{% block title %}Leave a review{% endblock %}

{% block content %}
    <p><a href="{% url 'marketplace:order_detail' order.pk %}">&larr; Back to order</a></p>
    <h1>Review for {{ order.repository.title }}</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn" type="submit">Publish review</button>
    </form>
{% endblock %}
