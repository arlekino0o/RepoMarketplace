{% extends "base.html" %}

{% block title %}Log in{% endblock %}

{% block content %}
    <section class="auth-page">
        <div class="card form-card auth-card">
            <div class="auth-logo"><h1>Вход</h1><p>Войдите в свой аккаунт.</p></div>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button class="btn-primary" type="submit">Войти</button>
            </form>
            <p class="auth-footer">Нет аккаунта? <a href="{% url 'marketplace:register' %}">Зарегистрироваться</a></p>
        </div>
    </section>
{% endblock %}
