<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Repo Marketplace{% endblock %}</title>
    <style>
        body { font-family: sans-serif; max-width: 960px; margin: 2rem auto; padding: 0 1rem; color: #222; }
        nav a { margin-right: 1rem; }
        .messages { list-style: none; padding: 0; }
        .messages li { padding: 0.5rem 1rem; margin-bottom: 0.5rem; background: #eef; border-radius: 4px; }
        .card { border: 1px solid #ddd; border-radius: 6px; padding: 1rem; margin-bottom: 1rem; }
        .card h3 { margin-top: 0; }
        form p { margin: 0.75rem 0; }
        label { display: block; font-weight: bold; margin-bottom: 0.25rem; }
        .filters { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
        .btn { display: inline-block; padding: 0.4rem 0.8rem; background: #333; color: #fff; text-decoration: none; border-radius: 4px; border: none; cursor: pointer; }
    </style>
</head>
<body>
<nav>
    <a href="{% url 'marketplace:repository_list' %}">Repositories</a>
</nav>
<hr>
{% if messages %}
    <ul class="messages">
        {% for message in messages %}
            <li>{{ message }}</li>
        {% endfor %}
    </ul>
{% endif %}
{% block content %}{% endblock %}
</body>
</html>
