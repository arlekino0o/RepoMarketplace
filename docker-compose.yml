version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: django_db_dev
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=dev_db
      - POSTGRES_USER=dev_user
      - POSTGRES_PASSWORD=dev_password

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: django_web_dev
    command: >
      bash -c "python manage.py migrate &&
               python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_NAME=django_dev_db
      - DB_USER=django_dev_user
      - DB_PASSWORD=django_dev_password
      - DJANGO_DEBUG=True
    depends_on:
      - db

volumes:
  postgres_data_dev:
